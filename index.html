<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Cloaker</title>

    <meta name="description" content="Cloaks any URL to allow you to visit any website by changing the URL to about:blank so blocking extensions cannot run on it. ">
    <meta name="author" content="Affan Shaikh">
    <meta name="robots" content="noindex, nofollow">
    <meta property="og:title" content="URL Cloaker">
    <meta property="og:description" content="Cloaks any URL to allow you to visit any website by changing the URL to about:blank so blocking extensions cannot run on it. ">
    <meta property="og:type" content="website">

    <noscript>noscript</noscript>

    <script>
      var cloak = window.open('', '_blank');
      cloak.document.open();

      cloak.document.write(`
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>URL Cloaker</title>

  ${
    (new URLSearchParams(window.location.search)).has("site") ? `` : `
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  `
  }
</head>

<body class="vh-100 d-flex justify-content-center align-items-center">

${
  (new URLSearchParams(window.location.search)).has("site") ? `
  <iframe id="frame"
    style="width:100%;height:100vh;border:0;">
  </iframe>

  <script>
    function b64urlDecode(str){
      str = str.replace(/-/g,'+').replace(/_/g,'/');
      while(str.length % 4) str += '=';
      const bin = atob(str);
      const bytes = Uint8Array.from(bin, c => c.charCodeAt(0));
      return new TextDecoder().decode(bytes);
    }

    const params = new URLSearchParams(window.location.search);
    const encoded = params.get("site");

    if(encoded){
      try {
        const decoded = b64urlDecode(encoded);
        document.getElementById("frame").src = decoded;
      } catch(e){}
    }
  <\/script>
  ` : `
  <div class="modal-dialog modal-lg">
    <div class="modal-content rounded-4 shadow">
      <div class="modal-header p-5 pb-4 border-bottom-0">
        <h1 class="fw-bold mb-0 fs-2">URL Cloaker</h1>
      </div>

      <div class="modal-body p-5 pt-0">
        <form id="form">
          <div class="input-group mb-3">
            <div class="form-floating flex-grow-1">
              <input type="url" class="form-control" id="floatingInput" placeholder="https://example.com">
              <label for="floatingInput">URL</label>
            </div>
            <button class="btn btn-primary" type="submit">Cloak</button>
          </div>
          <small class="text-body-secondary">You use this tool at your own risk.</small>
        </form>
      </div>
    </div>
  </div>

  <script>
    const dark = window.matchMedia("(prefers-color-scheme:dark)");
    function applyTheme(e){
      document.documentElement.setAttribute("data-bs-theme", e.matches ? "dark" : "light");
    }
    applyTheme(dark);
    dark.addEventListener("change", applyTheme);

    function b64urlEncode(str){
      const bytes = new TextEncoder().encode(str);
      let bin = "";
      for(const b of bytes) bin += String.fromCharCode(b);
      return btoa(bin).replace(/\\+/g,'-').replace(/\\//g,'_').replace(/=+$/,'');
    }

    document.getElementById("form").addEventListener("submit", (e)=>{
      e.preventDefault();

      const input = document.getElementById("floatingInput").value.trim();
      if(!input) return;

      let url;
      try { url = new URL(input).toString(); }
      catch { return; }

      const encoded = b64urlEncode(url);

      const target = new URL(window.location.href);
      target.searchParams.set("site", encoded);

      window.location.href = target.toString();
    });
  <\/script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"><\/script>
  `
}
</body>
</html>
      `);

      cloak.document.close();
      window.close();
    </script>
  </head>

  <body></body>
</html>
